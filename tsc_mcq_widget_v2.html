<!-- THE SCIENCE CUBE — MCQ Challenge Widget v2 -->
<!-- Paste this entire block into your Teachable Custom HTML block -->
<div id="tsc-mcq" style="font-family:'Courier New',monospace;max-width:720px;margin:0 auto;background:#fff;border:1px solid #c8ccd4;border-radius:8px;overflow:hidden;">

  <!-- Header -->
  <div style="background:#1b2a4a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:30px;height:30px;background:#f7c948;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#1b2a4a;letter-spacing:-1px;">SC</div>
      <span style="font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#fff;">Physics Challenge</span>
    </div>
    <span style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#6b8aaa;" id="tsc-progress">Question 1 of 1</span>
  </div>

  <!-- Question -->
  <div style="margin:20px 20px 0;border-left:3px solid #f7c948;padding:12px 16px;background:#f6f7f9;border-radius:0 5px 5px 0;">
    <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#1b6b6b;margin-bottom:6px;" id="tsc-qlabel">Question 1</div>
    <div style="font-size:17px;line-height:1.7;color:#1b2a4a;" id="tsc-qtext"></div>
  </div>

  <!-- Options -->
  <div style="margin:16px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="tsc-options"></div>

  <!-- Feedback (hidden until answered) -->
  <div id="tsc-feedback" style="display:none;margin:14px 20px 0;padding:12px 16px;border-radius:5px;font-size:14px;line-height:1.6;"></div>

  <!-- Simulation iframe — always visible, blurred until answered -->
  <div style="margin:14px 20px 0;border-radius:6px;overflow:hidden;border:1px solid #c8ccd4;position:relative;">

    <!-- Blur overlay — shown before answer, hidden after -->
    <div id="tsc-blur-overlay" style="position:absolute;inset:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:rgba(246,247,249,0.55);z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;">
      <div style="font-size:22px;">🔒</div>
      <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#1b2a4a;font-weight:700;">Answer to unlock simulation</div>
    </div>

    <!-- Sim label -->
    <div style="background:#f6f7f9;border-bottom:1px solid #c8ccd4;padding:7px 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#1b6b6b;position:relative;z-index:1;">&#9654; See the Physics</div>

    <iframe id="tsc-sim-iframe" src="" width="100%" height="420" style="display:block;border:none;" loading="lazy"></iframe>
  </div>

  <!-- Next button (hidden until answered) -->
  <div id="tsc-next-wrap" style="display:none;margin:14px 20px 0;text-align:right;">
    <button id="tsc-next-btn" onclick="tscNext()" style="background:#1b2a4a;color:#fff;border:none;border-radius:5px;padding:11px 24px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">Next Question &#8594;</button>
  </div>

  <!-- Footer CTA — always visible -->
  <div style="margin:16px 20px 16px;padding-top:14px;border-top:1px solid #c8ccd4;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <span style="font-size:11px;color:#9090a8;text-transform:uppercase;letter-spacing:.08em;">thesciencecube.com</span>
    <a href="https://www.thesciencecube.com/courses" style="background:#f7c948;color:#1b2a4a;text-decoration:none;border-radius:5px;padding:10px 20px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Explore Courses &#8594;</a>
  </div>

</div>

<style>
  #tsc-mcq .tsc-opt {
    background:#f6f7f9;border:1.5px solid #c8ccd4;border-radius:5px;
    padding:12px 14px;font-size:15px;color:#1b2a4a;cursor:pointer;
    font-family:'Courier New',monospace;text-align:left;transition:border-color .15s,background .15s;
  }
  #tsc-mcq .tsc-opt:hover { border-color:#1b2a4a;background:#eef0f5; }
  #tsc-mcq .tsc-opt.tsc-correct { border-color:#1b6b3a;background:#e8f5ee;color:#1b6b3a;font-weight:700; }
  #tsc-mcq .tsc-opt.tsc-wrong { border-color:#c85a00;background:#fff8f4;color:#c85a00; }
  #tsc-mcq .tsc-opt.tsc-disabled { cursor:default; }
  #tsc-mcq .tsc-opt.tsc-disabled:hover { border-color:#c8ccd4 !important;background:#f6f7f9 !important; }
  #tsc-mcq .tsc-opt.tsc-correct.tsc-disabled:hover { border-color:#1b6b3a !important;background:#e8f5ee !important; }
  #tsc-mcq .tsc-opt.tsc-wrong.tsc-disabled:hover { border-color:#c85a00 !important;background:#fff8f4 !important; }
  #tsc-blur-overlay { transition: opacity .4s ease; }
  @media(max-width:480px){ #tsc-options{ grid-template-columns:1fr !important; } }
</style>

<script>
(function(){

  // =============================================
  // QUESTION BANK
  // Add new questions below. Each entry needs:
  //   q        : question text (HTML ok)
  //   opts     : array of exactly 4 strings
  //   correct  : index of correct answer (0=A, 1=B, 2=C, 3=D)
  //   explanation     : shown when correct
  //   wrongExplanation: shown when wrong
  //   sim      : URL of simulation on GitHub Pages
  // =============================================
  var QB = [
    {
      q: "A <strong>4 kg</strong> box accelerates at <strong>3 m/s²</strong> across a frictionless surface. What is the net force acting on the box?",
      opts: ["0.75 N", "7 N", "12 N", "48 N"],
      correct: 2,
      explanation: "✓ Correct! Using F = ma: F = (4 kg)(3 m/s²) = 12 N. Net force equals mass times acceleration. Adjust the sliders below to explore how changing mass or force affects acceleration.",
      wrongExplanation: "Not quite. Use F = ma — multiply mass × acceleration. F = (4 kg)(3 m/s²) = 12 N. Explore the simulation below to build the intuition.",
      sim: "https://visheshnigam.github.io/tsc-sims/fma_sim_only.html"
    }
    // -----------------------------------------------
    // PASTE YOUR NEXT QUESTIONS HERE — copy the block
    // above, add a comma after the }, then paste below.
    // -----------------------------------------------
  ];

  var cur = 0;
  var labels = ['A','B','C','D'];

  function load(i) {
    var q = QB[i];
    document.getElementById('tsc-progress').textContent = 'Question ' + (i+1) + ' of ' + QB.length;
    document.getElementById('tsc-qlabel').textContent = 'Question ' + (i+1);
    document.getElementById('tsc-qtext').innerHTML = q.q;

    // Reset sim
    document.getElementById('tsc-sim-iframe').src = q.sim;
    document.getElementById('tsc-blur-overlay').style.opacity = '1';
    document.getElementById('tsc-blur-overlay').style.pointerEvents = 'none';
    document.getElementById('tsc-blur-overlay').style.display = 'flex';

    // Reset feedback
    var fb = document.getElementById('tsc-feedback');
    fb.style.display = 'none';
    fb.textContent = '';

    // Reset next button
    document.getElementById('tsc-next-wrap').style.display = 'none';

    // Build options
    var optWrap = document.getElementById('tsc-options');
    optWrap.innerHTML = '';
    q.opts.forEach(function(txt, idx) {
      var btn = document.createElement('button');
      btn.className = 'tsc-opt';
      btn.innerHTML = '<span style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.45;display:block;margin-bottom:3px;">' + labels[idx] + '</span>' + txt;
      btn.onclick = function() { answer(idx, q); };
      optWrap.appendChild(btn);
    });
  }

  function answer(chosen, q) {
    // Lock all buttons
    var btns = document.querySelectorAll('#tsc-options .tsc-opt');
    btns.forEach(function(b) { b.classList.add('tsc-disabled'); b.onclick = null; });

    var isCorrect = (chosen === q.correct);
    btns[chosen].classList.add(isCorrect ? 'tsc-correct' : 'tsc-wrong');
    if (!isCorrect) btns[q.correct].classList.add('tsc-correct');

    // Show feedback
    var fb = document.getElementById('tsc-feedback');
    fb.style.display = 'block';
    fb.style.background = isCorrect ? '#e8f5ee' : '#fff8f4';
    fb.style.borderLeft = '3px solid ' + (isCorrect ? '#1b6b3a' : '#c85a00');
    fb.style.color = isCorrect ? '#1b4a2a' : '#7a3000';
    fb.textContent = isCorrect ? q.explanation : q.wrongExplanation;

    // Unblur sim
    var overlay = document.getElementById('tsc-blur-overlay');
    overlay.style.opacity = '0';
    setTimeout(function() { overlay.style.display = 'none'; }, 420);

    // Show next button or completion
    var nextWrap = document.getElementById('tsc-next-wrap');
    if (cur < QB.length - 1) {
      nextWrap.innerHTML = '<button id="tsc-next-btn" onclick="tscNext()" style="background:#1b2a4a;color:#fff;border:none;border-radius:5px;padding:11px 24px;font-family:\'Courier New\',monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">Next Question &#8594;</button>';
    } else {
      nextWrap.innerHTML = '<div style="text-align:center;padding:10px 0;font-size:13px;color:#1b2a4a;letter-spacing:.05em;">🎉 You\'ve completed all questions! More coming soon.</div>';
    }
    nextWrap.style.display = 'block';
  }

  window.tscNext = function() {
    if (cur < QB.length - 1) { cur++; load(cur); }
  };

  load(0);

})();
</script>
