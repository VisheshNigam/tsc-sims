<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SC</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eaecf0;display:flex;justify-content:center;padding:24px 16px 40px}
.r{background:#fff;border:1px solid #c8ccd4;border-radius:8px;overflow:hidden;width:100%;max-width:680px}
.tb{background:#f6f7f9;border-bottom:1px solid #c8ccd4;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.br{display:flex;align-items:center;gap:9px}
.lm{width:28px;height:28px;background:#1b2a4a;border-radius:4px;display:flex;align-items:center;justify-content:center;font:900 12px 'Courier New',monospace;color:#fff;letter-spacing:-1px}
.bn{font:700 12px 'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;color:#1b2a4a}
.tg{font:12px 'Courier New',monospace;letter-spacing:.08em;text-transform:uppercase;color:#1b6b6b;background:#e6f4f4;border:1px solid #a8d4d4;border-radius:4px;padding:3px 9px}
.q{margin:16px 20px 0;border-left:3px solid #1b2a4a;padding:10px 14px;background:#f6f7f9;border-radius:0 5px 5px 0}
.ql{font:12px 'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;color:#1b6b6b;margin-bottom:5px}
.qt{font-size:20px;line-height:1.6;color:#1b2a4a}
.sa{margin:14px 20px;background:#fff;border:1px solid #c8ccd4;border-radius:4px;height:200px;overflow:hidden}
.sa canvas{display:block;width:100%;height:100%}
.cc{margin:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ct{background:#f6f7f9;border:1px solid #c8ccd4;border-radius:5px;padding:10px 14px}
.cl{font:12px 'Courier New',monospace;letter-spacing:.08em;text-transform:uppercase;color:#1b6b6b;margin-bottom:3px}
.cv{font:700 30px 'Courier New',monospace;color:#1b2a4a;margin-bottom:6px}
input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:#c0c8d4;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#1b2a4a;cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#1b2a4a;border:none;cursor:pointer}
.rs{margin:10px 20px;background:#1b2a4a;border-radius:5px;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.rl{font:12px 'Courier New',monospace;letter-spacing:.08em;text-transform:uppercase;color:#6b8aaa;margin-bottom:2px}
.re{font:18px 'Courier New',monospace;color:#a8b8cc}
.rv{font:700 36px 'Courier New',monospace;color:#fff}
.ch{margin:10px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.co{background:#f6f7f9;border:1px solid #c8ccd4;border-radius:4px;padding:10px 14px;font-size:20px;color:#1b2a4a;cursor:pointer;user-select:none}
.co:hover{border-color:#1b2a4a;background:#eef0f5}
.co.ok{border-color:#1b2a4a;background:#1b2a4a;color:#fff}
.co.no{border-color:#c85a00;background:#fff8f4;color:#c85a00}
.ck{font:12px 'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;opacity:.4}
.fb{font:16px 'Courier New',monospace;color:#5a7080;margin:4px 20px 0}
.fb.ok{color:#1b2a4a;font-weight:700}.fb.no{color:#c85a00}
.ft{margin:10px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #c8ccd4;padding-top:10px}
.fs,.fu{font:12px 'Courier New',monospace;color:#9090a8}
.fu{text-transform:uppercase;letter-spacing:.08em}
@media(max-width:420px){.cc,.ch{grid-template-columns:1fr}}
</style></head><body>
<div class="r">
<div class="tb"><div class="br"><div class="lm">SC</div><div class="bn">The Science Cube</div></div><div class="tg">AP Physics 1</div></div>
<div class="q"><div class="ql">Question 1</div><div class="qt">A <strong id="qm">4</strong> kg box accelerates at <strong id="qa">3.0</strong> m/s&#178; across a frictionless surface. What is the net force?</div></div>
<div class="sa"><canvas id="c"></canvas></div>
<div class="cc">
<div class="ct"><div class="cl">Mass</div><div class="cv" id="md">4 kg</div><input type="range" id="ms" min="1" max="10" value="4" step="1"></div>
<div class="ct"><div class="cl">Net Force</div><div class="cv" id="fd">12 N</div><input type="range" id="fs" min="2" max="40" value="12" step="1"></div>
</div>
<div class="rs"><div><div class="rl">Acceleration = F &#247; m</div><div class="re" id="eq">12 N &#247; 4 kg</div></div><div class="rv" id="ac">3.0 m/s&#178;</div></div>
<div class="ch">
<div class="co" data-c="0" onclick="ch(this)"><div class="ck">A</div>0.75 N</div>
<div class="co" data-c="0" onclick="ch(this)"><div class="ck">B</div>7 N</div>
<div class="co" data-c="1" onclick="ch(this)"><div class="ck">C</div>12 N</div>
<div class="co" data-c="0" onclick="ch(this)"><div class="ck">D</div>48 N</div>
</div>
<div class="fb" id="fb"></div>
<div class="ft"><div class="fs" id="sc">Adjust sliders, then pick an answer</div><div class="fu">thesciencecube.com</div></div>
</div>
<script>
(function(){
var NV='#1b2a4a',TL='#1b7b7b',OR='#e07020';
var cv=document.getElementById('c'),ct=cv.parentElement,dpr=window.devicePixelRatio||1;
var W,H,ctx,bgC=document.createElement('canvas'),bxC=document.createElement('canvas'),cM=-1,cF=-1;
var LW=1.4,pos=44,vel=0,lTs=null;
function ini(){W=ct.offsetWidth;H=ct.offsetHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx=cv.getContext('2d');ctx.scale(dpr,dpr);}
function ln(c,x1,y1,x2,y2,col){c.save();c.strokeStyle=col||NV;c.lineWidth=LW;c.lineCap='round';c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.restore();}
function hd(c,x,y,a,col,s){s=s||8;c.save();c.fillStyle=col||NV;c.beginPath();c.moveTo(x,y);c.lineTo(x-s*Math.cos(a-.38),y-s*Math.sin(a-.38));c.lineTo(x-s*Math.cos(a+.38),y-s*Math.sin(a+.38));c.closePath();c.fill();c.restore();}
function ar(c,x1,y1,x2,y2,col,hs){var dx=x2-x1,dy=y2-y1,ag=Math.atan2(dy,dx),h=hs||8,l=Math.sqrt(dx*dx+dy*dy),ux=dx/l,uy=dy/l;ln(c,x1,y1,x2-ux*(h*.7),y2-uy*(h*.7),col);hd(c,x2,y2,ag,col,h);}
function lb(c,t,x,y,col,sz,al,bl){c.save();c.fillStyle=col||NV;c.font='italic '+(sz||18)+'px Georgia,serif';c.textAlign=al||'left';c.textBaseline=bl||'middle';c.fillText(t,x,y);c.restore();}
function lbs(c,m,s,x,y,col,sz){sz=sz||18;c.save();c.fillStyle=col||NV;c.textBaseline='middle';c.textAlign='left';c.font='italic '+sz+'px Georgia,serif';var mw=c.measureText(m).width;c.fillText(m,x,y);c.font='italic '+Math.round(sz*.7)+'px Georgia,serif';c.fillText(s,x+mw+.5,y+sz*.28);c.restore();}
function bBg(){bgC.width=W*dpr;bgC.height=H*dpr;var c=bgC.getContext('2d');c.scale(dpr,dpr);c.fillStyle='#fff';c.fillRect(0,0,W,H);var gY=H-36;ln(c,24,gY,W-24,gY,NV);for(var x=32;x<W-24;x+=14)ln(c,x,gY,x-10,gY+12,NV);}
function bBx(m,f){var a=f/m,bW=Math.round(42+m*5.5),bH=Math.round(38+m*4),gY=H-36,bY=gY-bH,wR=9,aL=Math.round(30+f*3.6),sW=bW+18+aL+50;
bxC.width=sW*dpr;bxC.height=H*dpr;var c=bxC.getContext('2d');c.scale(dpr,dpr);
[Math.round(bW*.25),Math.round(bW*.75)].forEach(function(wx){c.save();c.fillStyle='#fff';c.strokeStyle=NV;c.lineWidth=LW;c.beginPath();c.arc(wx,gY,wR,0,Math.PI*2);c.fill();c.stroke();c.fillStyle=NV;c.beginPath();c.arc(wx,gY,2,0,Math.PI*2);c.fill();c.restore();});
c.fillStyle=OR;c.fillRect(0,bY,bW,bH);c.strokeStyle=NV;c.lineWidth=LW;c.strokeRect(0,bY,bW,bH);
lbs(c,'m','1',bW/2-11,bY+bH/2,'#fff',Math.max(19,18+m*.65));
var asx=bW+12,aex=asx+aL,aY=bY+bH*.5;
ar(c,asx,aY,aex,aY,OR,9);lb(c,'F',aex+8,aY,OR,20);ln(c,aex+7,aY-12,aex+19,aY-12,OR);hd(c,aex+19,aY-12,0,OR,6);
var acL=Math.round(14+a*8),acY=bY-22;
ar(c,4,acY,Math.min(acL+4,bW-6),acY,TL,8);lb(c,'a',4,acY-15,TL,18);ln(c,3,acY-25,15,acY-25,TL);hd(c,15,acY-25,0,TL,6);
ar(c,bW/2,bY-2,bW/2,bY-32,NV,8);lb(c,'N',bW/2+8,bY-18,NV,18);
var mgX=Math.round(bW*.65);ar(c,mgX,gY-2,mgX,gY+20,NV,8);lb(c,'mg',mgX+6,gY+10,NV,16);
cM=m;cF=f;}
function draw(p,v){ctx.clearRect(0,0,W,H);ctx.drawImage(bgC,0,0,W*dpr,H*dpr,0,0,W,H);
if(v>1.5){var gv=gV(),bH=Math.round(38+gv.m*4),gY=H-36,vL=Math.min(Math.round(v*2.8),50),vY=gY-bH*.5;ctx.save();ctx.setLineDash([5,3]);ar(ctx,p-6,vY,p-8-vL,vY,TL,8);ctx.setLineDash([]);ctx.restore();lb(ctx,'v',p-16-vL,vY,TL,18,'center');}
ctx.drawImage(bxC,0,0,bxC.width,bxC.height,p,0,bxC.width/dpr,bxC.height/dpr);}
function gV(){var m=parseInt(document.getElementById('ms').value),f=parseInt(document.getElementById('fs').value);return{m:m,f:f,a:+(f/m).toFixed(2)};}
function mxP(v){return Math.max(44,W-Math.round(42+v.m*5.5)-Math.round(30+v.f*3.6)-68);}
function frm(ts){if(!lTs)lTs=ts;var dt=Math.min((ts-lTs)/1e3,.05);lTs=ts;var v=gV();if(v.m!==cM||v.f!==cF)bBx(v.m,v.f);vel+=v.a*dt*18;pos+=vel*dt;if(pos>=mxP(v)){pos=44;vel=0;}draw(Math.round(pos),vel);requestAnimationFrame(frm);}
function rb(){pos=44;vel=0;lTs=null;var v=gV();bBx(v.m,v.f);}
function ui(){var v=gV();document.getElementById('md').textContent=v.m+' kg';document.getElementById('fd').textContent=v.f+' N';document.getElementById('ac').textContent=v.a.toFixed(1)+' m/s\u00b2';document.getElementById('eq').textContent=v.f+' N \u00f7 '+v.m+' kg';document.getElementById('qm').textContent=v.m;document.getElementById('qa').textContent=v.a.toFixed(1);}
document.getElementById('ms').addEventListener('input',function(){ui();rb();});
document.getElementById('fs').addEventListener('input',function(){ui();rb();});
if(window.ResizeObserver)new ResizeObserver(function(){ini();bBg();rb();}).observe(ct);
window.ch=function(el){document.querySelectorAll('.co').forEach(function(c){c.classList.remove('ok','no');});var ok=el.dataset.c==='1';el.classList.add(ok?'ok':'no');var fb=document.getElementById('fb');fb.textContent=ok?'Correct! F = ma = 12 N':'Not quite \u2014 use F = ma.';fb.className='fb '+(ok?'ok':'no');document.getElementById('sc').textContent=ok?'Well done!':'Try again.';};
ini();bBg();ui();rb();requestAnimationFrame(frm);
})();
</script></body></html>
